<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>adataviz</title>
    <script type="module" src="/src/main.js" defer></script>
  </head>


  <body>

    <!--=====================HEADER=======================-->
    <header>
      <h1>Hôtel' Tours</h1>
      
    </header> 

    <!--===============FILTRES & RECHERCHE================-->
    <section class="filtres-recherche">

      <!-------------------------Filtres---------------------------->

      <div class="filtres">
        
        <!--------Filtre VILLE commune---------->
        <select name="ville" id="ville">
          <option value="" selected disabled>VILLE</option> <!--selected disabled (=sélectionné et désactivé) sélectionne par défaut (car "titre" du select) et empêche l'utilisateur de la sélectionner -->
          <option value="TOURS">TOURS</option>
          <option value="CHAMBRAY-LES-TOURS">CHAMBRAY-LES-TOURS</option>
          <option value="LA RICHE">LA RICHE</option>
        </select>

        <!--------Filtre ETOILE categorie_classement ---------->
        <select name="etoiles" id="etoiles">
          <option value="" selected disabled>ETOILES</option>
          <option value="1 étoile">1 étoile</option>
          <option value="2 étoiles">2 étoiles</option>
          <option value="3 étoiles">3 étoiles</option>
          <option value="4 étoiles">4 étoiles</option>
          <option value="5 étoiles">5 étoiles</option>
        </select>

        <!--------Filtre LANGUES PARLEES langues_parlees ---------->
        <select name="langue" id="langue">
          <option value="" selected disabled>LANGUES</option>
          <option value="Français">Français</option>
          <option value="Anglais">Anglais</option>
          <option value="Allemand">Allemand</option>
          <option value="Espagnol">Espagnol</option>
        </select>

      </div>

      <!-------------------------Recherche---------------------------->
      <div class="recherche">
        <input type="search" placeholder="Recherche...">
      </div>
      
    </section>


    <!--======================MAIN========================-->
    <main>
      <!--------------------- Insertion des cards------------------->
      <section class="cards-hotels">
        <div class="card">
          <h2>HOTEL A</h2>
          <p>2 rue Aaaaaaaaaaaaaaaa</p>
          <p>CHAMBRAY</p>
          <a href="http://www.legardenhotel.com">http://www.legardenhotel.com</a>
        </div>

        <div class="card">
          <h2>HOTEL B</h2>
          <p>2 rue Bbbbbbbbbbbbb</p>
          <p>TOURS</p>
          <a href="http://www.legardenhotel.com">http://www.legardenhotel.com</a>
        </div>

        <div class="card">
          <h2>HOTEL C</h2>
          <p>2 rue Cccccccccccccc</p>
          <p>LA RICHE</p>
          <a href="http://www.legardenhotel.com">http://www.legardenhotel.com</a>
        </div>
      </section>

      <!--------------------- Insertion de la map------------------->
      <section class="map">
        <iframe src="https://data.tours-metropole.fr/explore/embed/dataset/hotels-en-region-centre-val-de-loire/map/?disjunctive.epci_name&location=12,47.38311,0.643&basemap=jawg.streets&static=false&datasetcard=false&scrollWheelZoom=false" width="400" height="300" frameborder="0"></iframe>
      </section>
    </main>

    <!--======================FOOTER=========================-->


  </body>
</html>
